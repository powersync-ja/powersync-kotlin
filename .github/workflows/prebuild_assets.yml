name: Prebuild SQLite assets

on:
  workflow_call:
    outputs:
      artifact_url:
        description: "URL of the artifact containing precompiled SQLite binaries"
        value: ${{ jobs.compile.merge.artifact_url }}
      artifact_id:
        description: "id of the artifact containing precompiled SQLite binaries"
        value: ${{ jobs.compile.merge.artifact_id }}

jobs:
  compile:
    name: Compile SQLite
    timeout-minutes: 20
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        id: cache_prebuild
        with:
          path: internal/prebuild-binaries/build/output
          key: sqlite-build-${{ runner.os }}-${{ hashFiles('internal/prebuild-binaries/build.gradle.kts', 'plugins/build-plugin/src') }}
      - name: Validate Gradle Wrapper
        if: steps.cache_prebuild.outputs.cache-hit != 'true'
        uses: gradle/actions/wrapper-validation@v4
      - uses: actions/cache@v4
        if: runner.os == 'macOS' && steps.cache_prebuild.outputs.cache-hit != 'true'
        with:
          path: ~/.konan
          key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}
      - name: Set up JDK 25
        if: steps.cache_prebuild.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Set up Gradle
        if: steps.cache_prebuild.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Set up XCode
        if: runner.os == 'macOS' && steps.cache_prebuild.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
      - name: Install cross-compiling GCC
        shell: bash
        if: runner.os == 'Linux' && steps.cache_prebuild.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu
      - name: Download build tools
        if: runner.os == 'macOS' && steps.cache_prebuild.outputs.cache-hit != 'true'
        run: |
          brew install lld
          cd internal/prebuild-binaries
          ./download_llvm_mingw.sh
      - name: Compile SQLite with Gradle
        if: steps.cache_prebuild.outputs.cache-hit != 'true'
        run: |
          ./gradlew --scan --configure-on-demand internal:prebuild-binaries:compileAll
        shell: bash
      - uses: actions/upload-artifact@v5
        id: upload
        with:
          path: internal/prebuild-binaries/build/output/*
          name: single-os-build-${{ runner.os }}
          retention-days: 1

  merge:
    name: Merged compiled libraries
    timeout-minutes: 5
    runs-on: ubuntu-slim
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: internal/prebuild-binaries/build/output
          merge-multiple: true
          pattern: single-os-build-*

      - uses: actions/upload-artifact@v5
        id: upload
        with:
          path: internal/prebuild-binaries/build/output/*
          name: kotlin-sqlite
          retention-days: 1
      - run: |
          echo "${{ steps.upload.outputs.artifact-url }}"
